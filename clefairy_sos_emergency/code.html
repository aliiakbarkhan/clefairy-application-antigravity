<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b8c",
                        "background-light": "#f8f6f7",
                        "background-dark": "#221019",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden">
<!-- Main Container with iOS style glassmorphism backdrop -->
<div class="relative flex h-full w-full flex-col bg-gradient-to-b from-primary/10 via-background-dark to-background-dark">
<!-- Top App Bar -->
<header class="flex items-center px-6 py-4 justify-between">
<button class="text-slate-100 flex items-center justify-center p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h2 class="text-slate-100 text-lg font-bold tracking-tight">Clefairy SOS</h2>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content Section -->
<main class="flex-1 flex flex-col items-center justify-center px-8 space-y-12">
<!-- Urgent Status Header -->
<div class="text-center space-y-2">
<h1 class="text-4xl font-extrabold text-slate-100 tracking-tight">Emergency Alert</h1>
<div class="flex items-center justify-center gap-2 text-primary">
<span class="flex h-2 w-2 rounded-full bg-primary animate-pulse"></span>
<p class="text-sm font-semibold uppercase tracking-widest">Active Monitoring</p>
</div>
</div>
<!-- Prominent SOS Button with Pulse and Glow -->
<div class="relative flex items-center justify-center">
<!-- Background Pulse Rings -->
<div class="absolute w-72 h-72 rounded-full bg-primary/20 blur-2xl animate-pulse"></div>
<div class="absolute w-64 h-64 rounded-full border-2 border-primary/30"></div>
<!-- Main Circular Button -->
<button class="relative z-10 w-56 h-56 rounded-full bg-primary shadow-[0_0_50px_rgba(238,43,140,0.4)] flex flex-col items-center justify-center hover:scale-105 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-white text-6xl mb-1">podcasts</span>
<span class="text-white text-4xl font-black tracking-tighter">SOS</span>
</button>
</div>
<!-- Instruction Text -->
<div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 text-center max-w-sm">
<p class="text-slate-100 text-lg font-medium leading-relaxed">
                    Single-tap for emergency alert. 
                </p>
<p class="text-slate-400 text-sm mt-2">
                    Automatic GPS capture and sharing started with your emergency contacts.
                </p>
</div>
<!-- GPS Visualization (Simulated Map Fragment) -->
<div class="w-full h-24 rounded-2xl overflow-hidden border border-white/10 relative group">
<div class="absolute inset-0 bg-slate-800 flex items-center justify-center">
<div class="text-xs text-primary/80 flex items-center gap-2 bg-background-dark/80 px-3 py-1.5 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-xs">location_on</span>
                        Locating: 34.0522° N, 118.2437° W
                    </div>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent"></div>
</div>
</main>
<!-- Bottom Actions -->
<footer class="p-8 pb-12">
<button class="w-full py-4 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-100 font-bold text-lg transition-all border border-white/5 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">close</span>
                Cancel Alert
            </button>
<p class="text-center text-slate-500 text-xs mt-4">
                False alarm? Tap cancel to notify contacts you are safe.
            </p>
</footer>
</div>
</body></html>
