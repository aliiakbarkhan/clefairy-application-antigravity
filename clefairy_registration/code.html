<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clefairy Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b8c",
                        "background-light": "#f8f6f7",
                        "background-dark": "#221019",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Background Gradient and Decorative Blobs -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-background-dark via-[#3d1a2b] to-background-dark"></div>
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
</div>
<!-- Main Container -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<!-- Header Section -->
<div class="w-full max-w-md flex items-center justify-between mb-8 px-2">
<button class="flex items-center justify-center size-10 rounded-full bg-white/10 backdrop-blur-md border border-white/10 text-slate-100">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<div class="flex flex-col items-center">
<span class="text-primary font-bold text-xl tracking-tighter">Clefairy</span>
</div>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Glassmorphism Card -->
<div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-6 shadow-2xl">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold tracking-tight mb-2">Create Account</h1>
<p class="text-slate-400 text-sm">Your safety is our priority. Let's get you started.</p>
</div>
<form class="space-y-4">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-wider text-slate-400 px-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="Jane Doe" type="text"/>
</div>
</div>
<!-- Aadhaar Number -->
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-wider text-slate-400 px-1">Aadhaar Number</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl">fingerprint</span>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl pl-12 pr-12 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="12-digit Aadhaar number" type="text"/>
<span class="material-symbols-outlined absolute right-4 text-primary">verified_user</span>
</div>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-wider text-slate-400 px-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="jane@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-wider text-slate-400 px-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-wider text-slate-400 px-1">Confirm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock_reset</span>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-6" type="submit">
                    Sign Up
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Log In</a>
</p>
</div>
</div>
<!-- Footer Policy -->
<div class="mt-8 text-center max-w-xs">
<p class="text-[10px] text-slate-500 leading-relaxed uppercase tracking-widest">
                By signing up, you agree to our <br/>
<span class="text-slate-400 underline">Terms of Service</span> and <span class="text-slate-400 underline">Privacy Policy</span>
</p>
</div>
</div>
</body></html>
